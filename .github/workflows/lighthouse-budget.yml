name: Lighthouse budget check

"on":
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Fetch base branch for LHCI ancestry
        if: github.event_name == 'pull_request'
        run: git fetch --depth=1 origin +refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve Chrome path
        shell: bash
        run: |
          set -euo pipefail
          CHROME_PATH="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          echo "CHROME_PATH=${CHROME_PATH}" >> "$GITHUB_ENV"

      - name: Static preflight budgets
        run: |
          node tools/cleanup_build_artifacts.mjs --check
          node tools/audit_critical_bugfixes_wave89a.mjs
          node tools/audit_scripts_budget_wave89c.mjs
          node tools/audit_simple_mode_wave89d.mjs
          node tools/audit_onboarding_wave89e.mjs
          node tools/audit_hamburger_wave89f.mjs
          node tools/audit_minimal_footer_wave89g.mjs
          node tools/audit_skeleton_loading_wave89h.mjs
          node tools/audit_subject_color_groups_wave89i.mjs
          node tools/audit_parent_dashboard_wave89j.mjs
          node tools/audit_weak_device_adaptive_wave89k.mjs
          node tools/audit_spaced_repetition_sm2_wave89l.mjs
          node tools/audit_adaptive_difficulty_wave89m.mjs
          node tools/audit_learning_path_wave89n.mjs
          node tools/audit_exam_bank_generator_wave89q.mjs
          node tools/audit_self_host_fonts_wave89p.mjs
          node tools/audit_theory_coverage.mjs
          node tools/audit_static_events_wave87e.mjs
          node tools/audit_play_selection_wave89t.mjs
          node tools/audit_input_bridge_wave89v.mjs
          node tools/audit_diagnostic_exam_bindings_wave89u.mjs
          node tools/audit_lighthouse_ci_wave87s.mjs

      - id: perf_audit
        name: Performance proxy audit (advisory)
        continue-on-error: true
        run: node tools/audit_performance_wave86z.mjs

      - name: Install Lighthouse CI CLI
        run: npm install --no-save --no-audit --no-fund @lhci/cli@0.15.1

      - name: LHCI healthcheck
        run: npx lhci healthcheck --fatal

      - id: collect_lhci
        name: Collect Lighthouse runs (advisory)
        continue-on-error: true
        run: npx lhci collect --config=.lighthouserc.json

      - id: assert_lhci
        name: Assert Lighthouse budgets (advisory)
        continue-on-error: true
        run: npx lhci assert --config=.lighthouserc.json

      - name: Lighthouse summary
        if: always()
        run: |
          if [ "${{ steps.perf_audit.outcome }}" = "failure" ]; then
            echo "::warning::Performance proxy audit is currently advisory in this workflow and exceeded the static byte budget."
          fi
          if [ "${{ steps.collect_lhci.outcome }}" = "failure" ] || [ "${{ steps.assert_lhci.outcome }}" = "failure" ]; then
            echo "::warning::LHCI live run was advisory and failed. Static audits remain the hard gate; inspect uploaded artifacts for details."
          fi

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci-${{ github.run_id }}
          path: .lighthouseci
          if-no-files-found: warn
          retention-days: 7
