name: Lighthouse budget check

"on":
  pull_request:
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 20

      - name: Fetch base branch for LHCI ancestry
        if: github.event_name == 'pull_request'
        run: git fetch --depth=1 origin +refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Resolve Chrome path
        shell: bash
        run: |
          set -euo pipefail
          CHROME_PATH="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          echo "CHROME_PATH=${CHROME_PATH}" >> "$GITHUB_ENV"

      - name: Advisory onboarding audit
        continue-on-error: true
        run: node tools/audit_onboarding_wave89e.mjs

      - name: Advisory hamburger-menu audit
        continue-on-error: true
        run: node tools/audit_hamburger_wave89f.mjs

      - name: Advisory minimal-footer audit
        continue-on-error: true
        run: node tools/audit_minimal_footer_wave89g.mjs

      - name: Advisory skeleton-loading audit
        continue-on-error: true
        run: node tools/audit_skeleton_loading_wave89h.mjs

      - name: Advisory grouped-palette audit
        continue-on-error: true
        run: node tools/audit_subject_color_groups_wave89i.mjs

      - name: Advisory parent-dashboard audit
        continue-on-error: true
        run: node tools/audit_parent_dashboard_wave89j.mjs

      - name: Advisory weak-device audit
        continue-on-error: true
        run: node tools/audit_weak_device_adaptive_wave89k.mjs

      - name: Advisory SM-2 audit
        continue-on-error: true
        run: node tools/audit_spaced_repetition_sm2_wave89l.mjs

      - name: Advisory adaptive-difficulty audit
        continue-on-error: true
        run: node tools/audit_adaptive_difficulty_wave89m.mjs

      - name: Advisory learning-path audit
        continue-on-error: true
        run: node tools/audit_learning_path_wave89n.mjs

      - name: Advisory answer-click runtime audit
        continue-on-error: true
        run: node tools/audit_answer_click_runtime_wave90a.mjs

      - name: Advisory exam-mode navigation audit
        continue-on-error: true
        run: node tools/audit_exam_mode_navigation_wave90b.mjs

      - name: Advisory math exam depth audit
        continue-on-error: true
        run: node tools/audit_math_exam_depth_wave90c.mjs

      - name: Advisory full exam variant-depth audit
        continue-on-error: true
        run: node tools/audit_exam_variant_depth_wave90d.mjs

      - id: policy_audit
        name: Lighthouse static policy audit (advisory)
        continue-on-error: true
        run: node tools/audit_lighthouse_ci_wave87s.mjs

      - id: install_lhci
        name: Install Lighthouse CI CLI (advisory)
        continue-on-error: true
        run: npm install --no-save --no-audit --no-fund @lhci/cli@0.15.1

      - id: healthcheck_lhci
        name: LHCI healthcheck (advisory)
        continue-on-error: true
        run: npx lhci healthcheck

      - id: collect_lhci
        name: Collect Lighthouse runs (advisory)
        continue-on-error: true
        run: npx lhci collect --config=.lighthouserc.json

      - id: assert_lhci
        name: Assert Lighthouse budgets (advisory)
        continue-on-error: true
        run: npx lhci assert --config=.lighthouserc.json

      - name: Lighthouse summary
        if: always()
        run: |
          if [ "${{ steps.policy_audit.outcome }}" = "failure" ]; then
            echo "::warning::Static Lighthouse policy audit is advisory in this workflow. The hard gate remains in validate-questions.yml."
          fi
          if [ "${{ steps.install_lhci.outcome }}" = "failure" ] || [ "${{ steps.healthcheck_lhci.outcome }}" = "failure" ]; then
            echo "::warning::LHCI setup was advisory and failed on this runner. Live Lighthouse is best-effort here; inspect the artifacts and rerun manually if needed."
          fi
          if [ "${{ steps.collect_lhci.outcome }}" = "failure" ] || [ "${{ steps.assert_lhci.outcome }}" = "failure" ]; then
            echo "::warning::LHCI live run was advisory and failed. Static audits remain the hard gate; inspect uploaded artifacts for details."
          fi

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci-${{ github.run_id }}
          path: .lighthouseci
          if-no-files-found: warn
          retention-days: 7
