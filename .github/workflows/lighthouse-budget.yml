name: Lighthouse budget

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  lhci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run Lighthouse CI budgets
        run: npx --yes @lhci/cli autorun --config=.lighthouserc.json
