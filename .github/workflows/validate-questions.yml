name: Validate question banks

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Assert no orphan hashed assets
        run: |
          node tools/cleanup_build_artifacts.mjs --check
          node tools/audit_critical_bugfixes_wave89a.mjs
          node tools/audit_self_host_fonts_wave89p.mjs
          node tools/audit_theory_coverage.mjs

      - name: Enforce grade-page scripts budget
        run: node tools/audit_scripts_budget_wave89c.mjs
      - name: Enforce simple-mode UX gate
        run: node tools/audit_simple_mode_wave89d.mjs
      - name: Enforce onboarding tour
        run: node tools/audit_onboarding_wave89e.mjs
      - name: Enforce hamburger secondary-actions menu
        run: node tools/audit_hamburger_wave89f.mjs
      - name: Enforce minimal two-button footer
        run: node tools/audit_minimal_footer_wave89g.mjs
      - name: Enforce skeleton loading for lazy chunks
        run: node tools/audit_skeleton_loading_wave89h.mjs
      - name: Enforce grouped subject palette
        run: node tools/audit_subject_color_groups_wave89i.mjs
      - name: Enforce optimized parent dashboard
        run: node tools/audit_parent_dashboard_wave89j.mjs
      - name: Enforce weak-device adaptive UI
        run: node tools/audit_weak_device_adaptive_wave89k.mjs
      - name: Enforce SM-2 spaced repetition
        run: node tools/audit_spaced_repetition_sm2_wave89l.mjs
      - name: Enforce adaptive difficulty
        run: node tools/audit_adaptive_difficulty_wave89m.mjs
      - name: Enforce guided learning path
        run: node tools/audit_learning_path_wave89n.mjs

      - name: Validate question generators
        run: node tools/validate_questions.js
