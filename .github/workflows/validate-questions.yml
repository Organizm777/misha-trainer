name: Validate question banks

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enforce workflow audit parity
        run: node tools/audit_workflow_parity_wave89y.mjs

      - name: Assert no orphan hashed assets
        run: |
          node tools/cleanup_build_artifacts.mjs --check
          node tools/audit_critical_bugfixes_wave89a.mjs

      - name: Enforce grade-page scripts budget
        run: node tools/audit_scripts_budget_wave89c.mjs
      - name: Enforce simple-mode UX gate
        run: node tools/audit_simple_mode_wave89d.mjs
      - name: Enforce onboarding tour
        run: node tools/audit_onboarding_wave89e.mjs
      - name: Enforce hamburger secondary-actions menu
        run: node tools/audit_hamburger_wave89f.mjs
      - name: Enforce minimal two-button footer
        run: node tools/audit_minimal_footer_wave89g.mjs
      - name: Enforce skeleton loading for lazy chunks
        run: node tools/audit_skeleton_loading_wave89h.mjs
      - name: Enforce grouped subject palette
        run: node tools/audit_subject_color_groups_wave89i.mjs
      - name: Enforce optimized parent dashboard
        run: node tools/audit_parent_dashboard_wave89j.mjs
      - name: Enforce weak-device adaptive UI
        run: node tools/audit_weak_device_adaptive_wave89k.mjs
      - name: Enforce SM-2 spaced repetition
        run: node tools/audit_spaced_repetition_sm2_wave89l.mjs
      - name: Enforce adaptive difficulty
        run: node tools/audit_adaptive_difficulty_wave89m.mjs
      - name: Enforce guided learning path
        run: node tools/audit_learning_path_wave89n.mjs
      - name: Enforce structured exam bank / KIM generator
        run: node tools/audit_exam_bank_generator_wave89q.mjs
      - name: Enforce math exam depth / 10-variant coverage
        run: node tools/audit_math_exam_depth_wave90c.mjs
      - name: Enforce full exam variant depth / 10 variants for every family
        run: node tools/audit_exam_variant_depth_wave90d.mjs
      - name: Enforce self-hosted fonts / offline font coverage
        run: node tools/audit_self_host_fonts_wave89p.mjs
      - name: Enforce full theory coverage
        run: node tools/audit_theory_coverage.mjs
      - name: Enforce wave91e learning formats
        run: node tools/audit_learning_formats_wave91e.mjs
      - name: Enforce wave91f learning formats
        run: node tools/audit_learning_formats_wave91f.mjs
      - name: Enforce wave91g visual and interactive formats
        run: node tools/audit_visual_interactive_wave91g.mjs
      - name: Enforce wave91h UX/gamification/performance pack
        run: node tools/audit_wave91h_ux_perf.mjs
      - name: Enforce wave91h Brotli precompression
        run: node tools/precompress_brotli_wave91h.mjs --check
      - name: Enforce wave91i exam banks and solution steps
        run: node tools/audit_exam_banks_wave91i.mjs
      - name: Enforce wave91i theory patches
        run: node tools/audit_theory_wave91i.mjs
      - name: Enforce wave91i bundle analyzer budget
        run: node tools/bundle_analyzer_wave91i.mjs --check
      - name: Enforce generated index stats
        run: node tools/update_index_stats.mjs --check
      - name: Enforce desktop-safe play control bindings
        run: node tools/audit_play_selection_wave89t.mjs
      - name: Enforce window-state bridge / junior input guard
        run: node tools/audit_input_bridge_wave89v.mjs
      - name: Enforce rendered input editability / junior suppression
        run: node tools/audit_input_render_wave89w.mjs
      - name: Enforce lazy optional input / interaction banks
        run: node tools/audit_optional_input_banks_wave89x.mjs
      - name: Enforce static performance budget proxy
        run: node tools/audit_performance_wave86z.mjs
      - name: Enforce Lighthouse CI stability policy
        run: node tools/audit_lighthouse_ci_wave87s.mjs
      - name: Enforce diagnostic / exam CSP-safe controls
        run: node tools/audit_diagnostic_exam_bindings_wave89u.mjs
      - name: Enforce safe grade answer-click runtime fallback
        run: node tools/audit_answer_click_runtime_wave90a.mjs
      - name: Enforce exam-mode navigation / final review flow
        run: node tools/audit_exam_mode_navigation_wave90b.mjs

      - name: Validate question generators
        run: node tools/validate_questions.js
